<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" />
    <title>PORT 3D VISUALIZATION</title>
	 <style>
		  html, body {
			  margin: 0;
			  height: 100%;
		  }
		  /* Ensure the render target fills the viewport so the canvas has size */
		  #root-window, #render-target {
			  width: 100vw;
			  height: 100vh;
			  display: block;
		  }
		  /* Make sure the render target doesn't add extra spacing */
		  #render-target > canvas {
			  display: block;
		  }
	 </style>
  </head>
  <body>
    <div id="root-window">
		<div id="render-target"></div>
	</div>
	
	<script type="module">
		import { createScene } from './src/main.ts';
		import { createPortStructure } from './src/port.ts';
		import { createSea } from './src/sea.ts';

		window.addEventListener('load', () => {
			const scene = createScene();
			const portStructure = createPortStructure();
			const sea = createSea();

			// initialize scene with the port structure and start render loop
			scene.initialize(portStructure, sea)
			window.scene = scene;
			window.portStructure = portStructure;
			scene.start();
		});
	</script>
    
  </body>
</html>
